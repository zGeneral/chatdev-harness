# The GameDev factory (ChatDev 2.0 GameDev_with_manager) re-expressed AS a declarative graph,
# so the game pipeline runs on the same engine as everything else. Keeps the dual success signal:
# pure logic in a pygame-free module (pytest) + a headless smoke-run of the real game.
# Run on demand:  /run-graph graphs/game_factory.yaml   (a full game build is a heavier run.)
graph:
  id: game_factory
  description: gdd -> core(build, TDD logic + headless game) -> polish -> qa -> verify(pytest + smoke)
  nodes:
    - id: gdd
      type: literal
      config:
        content: |
          Design + build a small Pygame game in ./out/game_factory: a "paddle bounce" — a paddle at the
          bottom moves left/right (arrow keys, clamped), a ball bounces off walls/paddle, miss = game over,
          R restarts, score = bounces. Never pure-black background; 60 FPS via Clock; clean QUIT.

    - id: core
      type: agent
      config:
        effort: medium
        role: |
          You are the Game Core Developer with REAL tools. Build into ./out/game_factory, keeping ALL pure
          logic (paddle clamp, ball physics, collision, scoring, state) in logic.py with NO pygame import,
          covered by pytest in tests/test_logic.py. game.py is the Pygame shell that imports logic.py and
          supports a HEADLESS SMOKE MODE: when env GAME_SMOKE_FRAMES=N is set, run N frames under
          SDL_VIDEODRIVER=dummy then pygame.quit()+sys.exit(0). Verify with:
            ROOT="$PWD"; cd out/game_factory && "$ROOT/.venv/bin/python" -m pytest -q
            ROOT="$PWD"; cd out/game_factory && SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy GAME_SMOKE_FRAMES=120 "$ROOT/.venv/bin/python" game.py
        instruction: 'Finish with EXACTLY one line: "RESULT: PASS" if pytest exit 0 AND the headless run exits 0, else "RESULT: FAIL".'

    - id: gate
      type: loop_counter
      config: { max_iterations: 2 }

    - id: polish
      type: agent
      config:
        effort: medium
        role: |
          You are the Polish Developer. Add tasteful visual juice to ./out/game_factory/game.py (color, simple
          particles/feedback, centered HUD) per docs/grounding/motion-math.md — easing (never linear +k/frame),
          volume-preserving squash & stretch on hits/bounces, anticipation, follow-through. Do this WITHOUT
          breaking the headless smoke mode or the logic tests, and WITHOUT moving logic out of logic.py. If the
          upstream is a PLAYABILITY: WEAK report, address its specific feel/payoff findings. Re-run the pytest +
          the headless GAME_SMOKE_FRAMES run; both must stay green.
        instruction: 'Finish with EXACTLY one line: "RESULT: PASS" if both gates still pass, else "RESULT: FAIL".'

    - id: qa
      type: agent
      config:
        agentType: feature-dev:code-reviewer
        role: |
          Review ./out/game_factory: is the logic genuinely pygame-free and tested, the headless smoke mode present,
          and the mandatory reqs met (no pure-black bg, R restart, 60 FPS, clean QUIT)? Also apply the objective
          UI/UX rules in docs/grounding/game-ui-review.md (readable text/contrast, state not color-alone, no
          hardcoded input prompts, no center-screen obstruction). List issues or say LGTM. Read-only.

    - id: playability
      type: agent
      config:
        agentType: feature-dev:code-reviewer
        role: |
          Acting as the PLAYABILITY ASSESSOR (see .claude/agents/playability-assessor.md), critique
          ./out/game_factory for GAME FEEL + PLAYABILITY before the build is cleared — read-only, edit nothing:
          responsiveness (input latency), impact/payoff (does scoring/bounce/game-over render layered feedback,
          not just mutate state?), motion juice (per docs/grounding/motion-math.md — flag dead linear `+k/frame`
          motion, missing squash & stretch), clarity (goal/state readable; not color-alone), loop closure
          (clear win/lose + restart), peak moments, and difficulty pacing. Cite code (file:line) for each.
          End with EXACTLY "PLAYABLE: OK" if there are no high-severity feel/playability problems, else
          "PLAYABLE: WEAK" + a prioritized findings list (severity, location, the dead/flat issue, a concrete fix).

    - id: play_gate
      type: loop_counter
      config: { max_iterations: 2 }

    - id: verify
      type: agent
      config:
        effort: low
        role: |
          Run BOTH and report results, editing nothing:
            ROOT="$PWD"; cd out/game_factory && "$ROOT/.venv/bin/python" -m pytest -q
            ROOT="$PWD"; cd out/game_factory && SDL_VIDEODRIVER=dummy SDL_AUDIODRIVER=dummy GAME_SMOKE_FRAMES=120 "$ROOT/.venv/bin/python" game.py; echo "SMOKE_EXIT=$?"
          Report logic tests passed/total, pytest exit, and smoke exit.

  edges:
    - { from: gdd, to: core }
    - { from: core, to: polish, condition: "contains:PASS" }
    - { from: core, to: gate, condition: "contains:FAIL" }
    - { from: gate, to: core }
    - { from: polish, to: qa }
    - { from: qa, to: playability }
    - { from: playability, to: verify, condition: "contains:PLAYABLE: OK" }
    - { from: playability, to: play_gate, condition: "default" }
    - { from: play_gate, to: polish }
    - { from: play_gate, to: verify, condition: "exhausted" }
