<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Baffle icon: a tern banking around a groyne into a drain">
  <rect width="512" height="512" rx="96" fill="#e9dec6"/>
  <!-- drain (sink) -->
  <circle cx="356" cy="160" r="58" fill="#1f7d80"/>
  <circle cx="356" cy="160" r="34" fill="none" stroke="#f6efe0" stroke-width="10"/>
  <!-- driftwood groyne (wall) -->
  <rect x="150" y="210" width="40" height="170" rx="14" fill="#6b4a2e"/>
  <!-- tern (mover) banking, chevron heading -->
  <path d="M150 380 q40 -60 110 -50" fill="none" stroke="#1f7d80" stroke-width="10" stroke-dasharray="14 14" opacity="0.55"/>
  <path d="M120 400 l44 -22 l-10 26 l30 6 l-50 18 z" fill="#c9701f"/>
</svg>
